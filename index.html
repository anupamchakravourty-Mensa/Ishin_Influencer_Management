<!-- ISHIN — LOADER PATCH
  ① CSS → inside <style>  ② HTML → first child of <body>  ③ JS → replace fetchCatalog()/hideLoader() -->

<!-- ① CSS — paste inside <style>, before </style> -->
<style id="PASTE-INSIDE-STYLE-TAG">
#loadingOverlay{position:fixed;inset:0;z-index:9999;background:#5C1020;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:opacity 0.7s ease;}
#loadingOverlay.hidden{opacity:0;pointer-events:none;}
.loading-center{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;}
.loading-brand-name{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;color:#FFFFFF;letter-spacing:0.04em;line-height:1;}
.loading-sub{font-size:9px;color:rgba(201,149,42,0.7);letter-spacing:5px;text-transform:uppercase;font-weight:600;margin-top:-4px;}
.loading-brndme{font-size:9px;color:rgba(201,149,42,0.35);letter-spacing:3px;text-transform:uppercase;}
.sweep-track{width:200px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin:4px 0;}
.sweep-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,#8B1A2B,#C9952A,#FFFFFF,#C9952A);animation:sweepAnim 2.8s cubic-bezier(0.4,0,0.2,1) infinite;}
@keyframes sweepAnim{0%{width:0%;opacity:1;}70%{width:100%;opacity:1;}85%{width:100%;opacity:0;}86%{width:0%;opacity:0;}100%{width:0%;opacity:1;}}
</style>

<!-- ② HTML — first child of <body>, REPLACING the existing .page-loader div -->
<div id="loadingOverlay">
  <div class="loading-center">
    <div class="loading-brand-name">Ishin</div>
    <div class="loading-sub">Women's Ethnic Wear</div>
    <div class="sweep-track"><div class="sweep-fill"></div></div>
    <div class="loading-brndme">by BRND·ME</div>
  </div>
</div>

<!-- ③ JS — REPLACE the existing hideLoader() and fetchCatalog() functions.
     The init() function stays the same — it still calls both. -->
<script id="REPLACE-hideLoader-and-fetchCatalog">
function hideLoader(){
  const o=document.getElementById('loadingOverlay');
  o.classList.add('hidden');
  setTimeout(()=>{o.style.display='none';},750);
}

async function fetchCatalog(){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(SHEET_RANGE)}?key=${API_KEY}`;
  try{
    document.getElementById('loaderText')&&(document.getElementById('loaderText').textContent='Fetching latest collection...');
    const res=await fetch(url);
    if(!res.ok){const err=await res.json();throw new Error(err?.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const rows=data.values||[];
    if(!rows.length)throw new Error('No data found in Master_Catalog sheet.');
    const styleMap={};
    rows.forEach(row=>{
      const finalShow=(row[COL.FINAL_SHOW]||'').trim().toUpperCase();
      if(finalShow!=='YES')return;
      const styleId=(row[COL.STYLE_ID]||'').trim();
      const skuId=(row[COL.SKU_ID]||'').trim();
      const size=(row[COL.SIZE]||'').trim();
      if(!styleId||!skuId||!size)return;
      if(!styleMap[styleId]){
        styleMap[styleId]={
          styleId,brand:(row[COL.BRAND]||'').trim(),gender:(row[COL.GENDER]||'').trim(),
          category:(row[COL.CATEGORY]||'').trim(),title:(row[COL.TITLE]||'').trim(),
          images:[(row[COL.IMG1]||'').trim(),(row[COL.IMG2]||'').trim(),(row[COL.IMG3]||'').trim()].filter(Boolean),
          sales:parseInt(row[COL.SALES]||'0',10),sizes:[],skus:[]
        };
      }
      if(!styleMap[styleId].sizes.includes(size))styleMap[styleId].sizes.push(size);
      styleMap[styleId].skus.push({skuId,size});
    });
    allStyles=Object.values(styleMap);
    if(!allStyles.length)throw new Error('No styles with FINAL_SHOW = YES found in Master_Catalog.');
    const now=new Date();
    document.getElementById('lastUpdated').textContent=`Updated ${now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}`;
    renderCatalog();
  }catch(err){
    console.error('Fetch error:',err);
    showError(`${err.message}`);
    showSkeletons(false);
  }
}
</script>
